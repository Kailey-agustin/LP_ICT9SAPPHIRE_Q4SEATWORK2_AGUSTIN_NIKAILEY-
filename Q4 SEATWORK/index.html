<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Authentication Page</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f1eb;
    }

    .container{
      width: 1100px;
      height: 600px;
      background: #fffdf9;
      border: 6px solid #cbb89d;
      border-radius: 35px;
      padding: 30px;
    }

    .inner-border{
      width: 100%;
      height: 100%;
      border: 4px solid #cbb89d;
      border-radius: 30px;
      padding: 40px;

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .left-text{
      width: 50%;
      text-align: center;
    }

    .left-text h1{
      font-size: 85px;
      line-height: 1.1;
      color: #2f2a26;
    }

    .login-box{
      width: 360px;
      background: #fffaf5;
      border: 10px solid #b89b7a;
      border-radius: 12px;
      padding: 35px;
    }

    .icon{
      text-align: center;
      font-size: 50px;
      margin-bottom: 10px;
    }

    .login-box h2{
      text-align: center;
      margin-bottom: 30px;
      color: #4b3d30;
      font-size: 40px;
    }

    .input-group{
      margin-bottom: 20px;
    }

    .input-group label{
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      color: #5c5044;
    }

    .input-group input{
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd2c4;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    .checkbox{
      margin-bottom: 20px;
      font-size: 16px;
      color: #5c5044;
    }

    .buttons{
      display: flex;
      gap: 15px;
    }

    .buttons button{
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn{
      background: #b89b7a;
      color: white;
      border: none;
    }

    .login-btn:hover{
      background: #a78b6d;
    }

    .cancel-btn{
      background: white;
      border: 2px solid #b89b7a;
      color: #5c5044;
    }

    .cancel-btn:hover{
      background: #f0e7dc;
    }

    .forgot{
      text-align: center;
      margin-top: 25px;
    }

    .forgot a{
      text-decoration: none;
      color: #8c7258;
      font-size: 17px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="inner-border">

      
      <div class="login-box">

        <div class="icon">👤</div>

        <h2>Login</h2>

        <div class="input-group">
          <label>Username</label>
          <input type="text" placeholder="Enter username">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password">
        </div>

        <div class="checkbox">
          <input type="checkbox">
          Stay logged in
        </div>

        <div class="buttons">
          <button class="login-btn">Login</button>
          <button class="cancel-btn">Cancel</button>
        </div>

        <div class="forgot">
          <a href="#">Forgot username / password?</a>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
